<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Expenses - Cloud</title>
    <style>
        :root { --accent: #00f2fe; --glass: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.15); }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #1a1a2e, #000); color: #eee; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .section { background: var(--glass); backdrop-filter: blur(15px); padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border); width: 100%; position: relative; }
        h1 { color: var(--accent); margin: 0 0 10px 0; font-size: 1.2rem; text-transform: uppercase; text-align: center; }
        .cycle-info { text-align: center; font-size: 0.75rem; color: #888; margin-bottom: 10px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--glass-border); flex: 1; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: 800; color: var(--accent); }
        input, select { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 5px; }
        .settle-card { background: rgba(0, 242, 254, 0.05); border: 1px dashed var(--accent); padding: 15px; border-radius: 15px; margin-top: 10px; font-size: 0.9rem; }
        .expense-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); position: relative; }
        .ex-main { display: flex; justify-content: space-between; padding-right: 35px; font-weight: 800; }
        .del-btn { position: absolute; top: 12px; right: 12px; color: #ff5f5f; border: none; background: none; cursor: pointer; font-size: 1.1rem; }
        .arc-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; font-size: 0.8rem; }
        .arc-del { color: #ff5f5f; cursor: pointer; font-size: 1.1rem; border: none; background: none; }
        .Shahzeb { color: #86efac; } .Samad { color: #d8b4fe; } .Abubakar { color: #fca5a5; } .Sohail { color: #fde047; } .Mansoor { color: #93c5fd; }
        #loading { position: fixed; top: 10px; right: 10px; font-size: 0.6rem; color: var(--accent); display: none; }
    </style>
</head>
<body>

<div id="loading">SYNCING...</div>

<div class="wrapper">
    <div class="section">
        <h1>Expense Splitter</h1>
        <div id="startDateDisplay" class="cycle-info">Cycle Start: Loading...</div>
        
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <input type="text" id="curSearch" placeholder="Search Currency..." style="margin-bottom:0; font-size:0.8rem;" onkeyup="filterCurrency()">
            <select id="currency" style="width:120px; margin-bottom:0;" onchange="render()">
                <option value="£">GBP (£)</option>
                <option value="$">USD ($)</option>
                <option value="PKR">PKR (Rs)</option>
                <option value="€">EUR (€)</option>
                <option value="₹">INR (₹)</option>
                <option value="AED">AED (د.إ)</option>
            </select>
        </div>

        <div style="display:flex; gap:10px;">
            <div class="stat-box"><span id="totalExp" class="stat-val">0</span><span style="font-size:0.6rem">TOTAL</span></div>
            <div class="stat-box"><span id="perPerson" class="stat-val">0</span><span style="font-size:0.6rem">PER HEAD</span></div>
        </div>

        <div id="settlementBox" class="settle-card">
            <strong>Settlements:</strong>
            <div id="settleList" style="margin-top:5px; color:#ccc; line-height: 1.4;">Calculating...</div>
        </div>
        
        <button class="btn" style="font-size: 0.7rem; margin-top:15px;" onclick="loadFromCloud()">Refresh Cloud Data</button>
    </div>

    <div class="section">
        <select id="userSelect">
            <option value="Shahzeb">Shahzeb</option><option value="Samad">Samad</option>
            <option value="Abubakar">Abubakar</option><option value="Sohail">Sohail</option>
            <option value="Mansoor">Mansoor</option>
        </select>
        <input type="text" id="amtInput" placeholder="Amount (e.g. 20+5.50)">
        <input type="text" id="descInput" placeholder="Details (e.g. Groceries)">
        <button class="btn" id="addBtn" onclick="addExpense()">Add Expense</button>
    </div>

    <div class="section">
        <h1>Current History</h1>
        <div id="expenseList"></div>
        <button class="btn" style="background: rgba(255,255,255,0.1); color:#fff; font-size: 0.7rem; border: 1px solid #ff5f5f; margin-top:10px;" onclick="startNewCycle()">End Month / Archive</button>
    </div>

    <div class="section">
        <h1>Archives</h1>
        <div id="archiveList"></div>
    </div>
</div>

<script>
    const BIN_ID = '69dab988856a682189232cd0';
    const MASTER_KEY = '$2a$10$mEQevkyTBNsghmiwikEtduB64tc1Lavu6lE7Ox5oXU30dnLrOqhhu';
    
    let db = { startDate: "", expenses: [], archives: [] };
    const users = ["Shahzeb", "Samad", "Abubakar", "Sohail", "Mansoor"];

    async function loadFromCloud() {
        showLoading(true);
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { 
                headers: { 'X-Master-Key': MASTER_KEY, 'X-Bin-Meta': false } 
            });
            db = await res.json();
            render();
        } catch (e) { alert("Error loading data. Check API Keys."); }
        showLoading(false);
    }

    async function saveToCloud() {
        showLoading(true);
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify(db)
            });
        } catch (e) { alert("Save failed."); }
        showLoading(false);
    }

    function render() {
        const symbol = document.getElementById('currency').value;
        document.getElementById('startDateDisplay').innerText = `Cycle Started: ${db.startDate || 'N/A'}`;
        const list = document.getElementById('expenseList');
        let total = 0;
        let userTotals = { Shahzeb:0, Samad:0, Abubakar:0, Sohail:0, Mansoor:0 };
        
        list.innerHTML = "";
        db.expenses.forEach((ex, i) => {
            total += ex.amount;
            userTotals[ex.name] += ex.amount;
            list.innerHTML += `
                <div class="expense-card">
                    <button class="del-btn" onclick="deleteEx(${i})">✕</button>
                    <div class="ex-main"><span class="${ex.name}">${ex.name}</span><span>${symbol}${ex.amount.toFixed(2)}</span></div>
                    <span style="font-size:0.8rem; color:#aaa;">${ex.desc}</span>
                </div>`;
        });

        const perHead = total / 5;
        document.getElementById('totalExp').innerText = symbol + total.toFixed(2);
        document.getElementById('perPerson').innerText = symbol + perHead.toFixed(2);

        let settleHtml = "";
        users.forEach(u => {
            const diff = userTotals[u] - perHead;
            if (diff > 0) {
                settleHtml += `<div><b class="${u}">${u}</b> gets back <b style="color:var(--accent)">${symbol}${diff.toFixed(2)}</b></div>`;
            } else if (diff < 0) {
                settleHtml += `<div><b class="${u}">${u}</b> owes <b style="color:#ff5f5f">${symbol}${Math.abs(diff).toFixed(2)}</b></div>`;
            }
        });
        document.getElementById('settleList').innerHTML = settleHtml || "Everyone is even!";

        const arcList = document.getElementById('archiveList');
        arcList.innerHTML = db.archives.length ? "" : "<p style='font-size:0.7rem;text-align:center;color:#666;'>No archives.</p>";
        db.archives.forEach((arc, i) => {
            arcList.innerHTML += `
                <div class="arc-item">
                    <div onclick="viewArchive(${i})" style="cursor:pointer">
                        📁 <strong>${arc.start} - ${arc.end}</strong><br>
                        <span style="color:#888">Total: ${symbol}${arc.total}</span>
                    </div>
                    <button class="arc-del" onclick="deleteArchive(${i})">🗑</button>
                </div>`;
        });
    }

    function filterCurrency() {
        const input = document.getElementById('curSearch').value.toUpperCase();
        const select = document.getElementById('currency');
        const options = select.options;
        for (let i = 0; i < options.length; i++) {
            options[i].style.display = options[i].text.toUpperCase().includes(input) ? "" : "none";
        }
    }

    async function addExpense() {
        const raw = document.getElementById('amtInput').value;
        const name = document.getElementById('userSelect').value;
        const desc = document.getElementById('descInput').value;
        if(!raw) return;
        try {
            let amt = raw.split('+').reduce((acc, p) => acc + parseFloat(p || 0), 0);
            db.expenses.unshift({ name, amount: amt, desc, date: new Date().toLocaleDateString() });
            render(); await saveToCloud();
            document.getElementById('amtInput').value = ""; document.getElementById('descInput').value = "";
        } catch(e) { alert("Invalid amount math"); }
    }

    async function startNewCycle() {
        if(!confirm("Archive current expenses and start fresh?")) return;
        let total = db.expenses.reduce((acc, ex) => acc + ex.amount, 0);
        db.archives.unshift({ start: db.startDate, end: new Date().toLocaleDateString(), total: total.toFixed(2), details: [...db.expenses] });
        db.expenses = []; db.startDate = new Date().toLocaleDateString();
        render(); await saveToCloud();
    }

    function viewArchive(i) {
        const arc = db.archives[i];
        const symbol = document.getElementById('currency').value;
        let msg = `ARCHIVE: ${arc.start} - ${arc.end}\nTotal: ${symbol}${arc.total}\n\n`;
        arc.details.forEach(d => msg += `• ${d.name}: ${symbol}${d.amount.toFixed(2)} (${d.desc})\n`);
        alert(msg);
    }

    async function deleteArchive(i) {
        if(confirm("Permanently delete this archive?")) {
            db.archives.splice(i, 1);
            render(); await saveToCloud();
        }
    }

    function deleteEx(i) { if(confirm("Delete expense?")) { db.expenses.splice(i,1); render(); saveToCloud(); } }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }
    window.onload = loadFromCloud;
</script>
</body>
</html>
